<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Modern</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">TokoModern</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Katalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Tentang</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Search & Filter Area -->
        <div class="search-container">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Cari Produk</label>
                    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Ketik nama produk...">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Filter Kategori</label>
                    <div id="filterButtons" class="d-flex flex-wrap gap-2">
                        <button class="btn btn-primary btn-filter active" data-category="all">Semua</button>
                        <!-- Kategori lainnya akan diisi oleh JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="productGrid">
            <!-- Data produk akan muncul di sini -->
        </div>

        <!-- Empty State -->
        <div id="empty-state">
            <img src="https://via.placeholder.com/150?text=Not+Found" alt="Tidak ditemukan" class="mb-3 opacity-50">
            <h4>Produk tidak ditemukan</h4>
            <p class="text-muted">Coba gunakan kata kunci atau filter lain.</p>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">&copy; 2024 TokoModern. Dibuat dengan Bootstrap & JavaScript.</p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
